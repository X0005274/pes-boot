name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # 릴리즈 에셋 업로드
  packages: write   # GHCR 이미지 push

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package (pes-app fat jar)
        run: mvn -B -ntp -pl pes-app -am -DskipTests package

      - name: Attach jar to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pes-app/target/pes-app-*.jar

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:latest
