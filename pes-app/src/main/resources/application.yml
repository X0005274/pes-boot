spring:
  application:
    name: pes-app

  datasource:
    # Oracle AI Database 26ai (23.x). 접속 정보는 OS 환경변수로 주입한다.
    url: ${PES_DB_URL:jdbc:oracle:thin:@//localhost:1521/PESPDB}
    username: ${PES_DB_USER:pes}
    password: ${PES_DB_PASSWORD:pes}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: pes-hikari
      maximum-pool-size: ${PES_DB_POOL_MAX:10}
      minimum-idle: ${PES_DB_POOL_MIN:2}
      connection-timeout: 30000

  flyway:
    # 운영 스키마는 Flyway 가 관리(db/migration). 기동 시 마이그레이션 적용.
    enabled: ${PES_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${PES_FLYWAY_BASELINE:false}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway 가 스키마를 생성하므로 검증만 수행(자동 DDL 금지)
      ddl-auto: ${PES_JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          batch_size: 50
    show-sql: ${PES_JPA_SHOW_SQL:false}

logging:
  level:
    com.playtogether.pes: ${PES_LOG_LEVEL:INFO}
  pattern:
    # 모든 로그 라인에 처리 컨텍스트(MDC) 포함 → correlationId 기반 추적
    level: "%5p [corrId=%X{corrId:-} entity=%X{entityType:-}:%X{entityId:-} src=%X{srcSystem:-}]"

# 운영 관측 엔드포인트
management:
  endpoints:
    web:
      exposure:
        include: ${PES_ACTUATOR_ENDPOINTS:health,info,metrics}
  endpoint:
    health:
      show-details: when_authorized

# ─────────────────────────────────────────────────────────────
# TIBCO Rendezvous 설정 (RV 어댑터 도입 시 사용). 현재는 미사용 placeholder.
# 모든 값은 OS 환경변수로 주입한다.
# ─────────────────────────────────────────────────────────────
pes:
  rv:
    service: ${PES_RV_SERVICE:7500}
    network: ${PES_RV_NETWORK:;}
    daemon: ${PES_RV_DAEMON:tcp:7500}
    subjects:
      lot-request: ${PES_RV_SUBJ_LOT_REQUEST:PES.UI.LOT.REQUEST}
      lot-event: ${PES_RV_SUBJ_LOT_EVENT:PES.UI.LOT.EVENT}
      lot-biz-event: ${PES_RV_SUBJ_LOT_BIZ_EVENT:PES.BIZ.LOT.EVENT}
